name: Release Build

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    strategy:
      matrix:
        goos: [linux, darwin, windows]
        goarch: [amd64, arm64]
    env:
      CGO_ENABLED: 0

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26"

      - name: Build server
        run: |
          GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} go build -ldflags="-s -w" -o mist-server-${{ matrix.goos }}-${{ matrix.goarch }} ./cmd/server

      - name: Build client
        run: |
          GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} go build -ldflags="-s -w" -o mist-client-${{ matrix.goos }}-${{ matrix.goarch }} ./cmd/client

      - name: Package (unix)
        if: matrix.goos != 'windows'
        run: |
          tar -czf mist-${{ matrix.goos }}-${{ matrix.goarch }}.tar.gz \
            mist-server-${{ matrix.goos }}-${{ matrix.goarch }} \
            mist-client-${{ matrix.goos }}-${{ matrix.goarch }}

      - name: Package (windows)
        if: matrix.goos == 'windows'
        run: |
          zip mist-windows-${{ matrix.goarch }}.zip \
            mist-server-windows-${{ matrix.goarch }} \
            mist-client-windows-${{ matrix.goarch }}

      - name: Upload assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            mist-*.tar.gz
            mist-*.zip
