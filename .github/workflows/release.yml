name: Release Build

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  server:
    name: Server (${{ matrix.goarch }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        goarch: [amd64, arm64]
    env:
      CGO_ENABLED: 0
      GOOS: linux

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26"

      - name: Build frontend
        run: cd web && npm ci && npm run build

      - name: Build
        run: |
          GOARCH=${{ matrix.goarch }} go build -ldflags="-s -w" -o mist-server-linux-${{ matrix.goarch }} ./cmd/mist-server

      - name: Upload
        uses: softprops/action-gh-release@v2
        with:
          files: mist-server-linux-${{ matrix.goarch }}

  client:
    name: Client (${{ matrix.goos }}/${{ matrix.goarch }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        goos: [linux, darwin, windows]
        goarch: [amd64, arm64]
    env:
      CGO_ENABLED: 0

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26"

      - name: Build frontend
        run: cd web && npm ci && npm run build

      - name: Build
        run: |
          SUFFIX=""
          if [ "${{ matrix.goos }}" = "windows" ]; then SUFFIX=".exe"; fi
          GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} go build -ldflags="-s -w" -o mist-client-${{ matrix.goos }}-${{ matrix.goarch }}${SUFFIX} ./cmd/mist-client

      - name: Upload
        uses: softprops/action-gh-release@v2
        with:
          files: mist-client-${{ matrix.goos }}-${{ matrix.goarch }}*
