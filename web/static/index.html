<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MIST Dashboard</title>
<link rel="stylesheet" href="/static/style.css">
</head>
<body>
<div class="container">
<header>
  <h1>MIST</h1>
  <span id="uptime"></span>
</header>

<section class="status-bar">
  <div class="status-indicator" id="state-indicator">
    <div class="dot"></div>
    <span id="server-state">--</span>
  </div>
  <div class="meta">
    <span id="server-addr">--</span>
  </div>
</section>

<div class="grid">
  <div class="card">
    <h3>Active Sessions</h3>
    <div class="value" id="active-sessions">0</div>
    <div class="sub" id="idle-sessions">0 idle</div>
  </div>
  <div class="card">
    <h3>Open Streams</h3>
    <div class="value" id="open-streams">0</div>
    <div class="sub" id="total-streams">0 total</div>
  </div>
  <div class="card">
    <h3>Connections</h3>
    <div class="value" id="active-conns">0</div>
    <div class="sub" id="accepted-conns">0 accepted</div>
  </div>
  <div class="card">
    <h3>Total Sessions</h3>
    <div class="value" id="total-sessions">0</div>
    <div class="sub">since start</div>
  </div>
</div>

<div class="tun-section" id="tun-section" style="display:none">
  <h2>TUN</h2>
  <div class="grid">
    <div class="card">
      <h3>Interface</h3>
      <div class="value small" id="tun-name">--</div>
      <div class="sub" id="tun-addr">--</div>
    </div>
    <div class="card">
      <h3>RX</h3>
      <div class="value small" id="tun-rx-packets">0</div>
      <div class="sub" id="tun-rx-bytes">0 B</div>
    </div>
    <div class="card">
      <h3>TX</h3>
      <div class="value small" id="tun-tx-packets">0</div>
      <div class="sub" id="tun-tx-bytes">0 B</div>
    </div>
  </div>
</div>

<footer>
  <span id="version">mist</span>
</footer>
</div>
<script src="/static/script.js"></script>
</body>
</html>
